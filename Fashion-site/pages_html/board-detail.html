<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summer 2026 - Board Detail</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/board-detail.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="home.html">
          <span class="brand-mark">489</span>
          <span>Fashion</span>
        </a>
        <nav class="nav-center" id="topNav">
          <a href="dashboard.html">Dashboard</a>
          <a href="wardrobe.html">Wardrobe</a>
          <a href="outfit-generator.html">Generator</a>
          <a href="saved-outfits.html">Saved Outfits</a>
          <a href="board.html" class="active">Boards</a>
        </nav>
        <div class="nav-right">
          <a class="signin-link" href="../index.html">Logout</a>
          <a class="avatar-btn" href="profile.html">
            <span class="avatar-fallback">JN</span>
          </a>
        </div>
      </div>
    </header>

    <main class="board-container">
      <div class="board-header">
        <div class="header-content">
          <div class="board-meta">
            <span class="visibility-badge public">🌍 Public Board</span>
            <span class="date-badge">Created Mar 4, 2026</span>
          </div>
          <h1>Summer 2026 Inspo</h1>
          <p class="description">
            Collection of fits for the upcoming warm weather. Focus on
            breathable fabrics and bright colors.
          </p>

          <div class="creator-info">
            <div class="avatar-small">JN</div>
            <span>By <strong>Jaeger Nelson</strong></span>
            <span class="dot">•</span>
            <span>12 Followers</span>
          </div>
        </div>

        <div class="header-actions">
          <button class="btn secondary">Edit Board</button>
          <button class="btn primary-btn">+ Add Outfit</button>
        </div>
      </div>

      <div id="posts-grid" class="posts-grid"></div>
    </main>

    <script src="../Javascript/board-detail.js"></script>
  </body>
</html>
