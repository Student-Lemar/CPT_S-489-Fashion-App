<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - 489 Fashion</title>

  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/register.css" />
</head>

<body>

  <header class="topbar">
    <div class="topbar-inner">

      <!-- LEFT -->
      <a class="brand" href="home.html">
        <span class="brand-mark">489</span>
        <span>Fashion</span>
      </a>

      <!-- CENTER (app.js fills this based on role) -->
      <nav class="nav-center" id="topNav"></nav>

      <!-- RIGHT -->
      <div class="nav-right">
        <a class="signin-link" href="login.html" data-page="login.html">Sign In</a>
        <a class="signin-link" href="register.html" data-page="register.html">Register</a>

        <!-- Hidden for guests automatically -->
        <a class="avatar-btn" href="profile.html" title="Account Settings">
          <span class="avatar-fallback">👤</span>
        </a>
      </div>

    </div>
  </header>

  <main class="auth-layout">

    <!-- LEFT IMAGE PANEL -->
    <section class="left-panel" aria-label="Left visual panel"></section>

    <!-- RIGHT FORM PANEL -->
    <section class="right-panel" aria-label="Register panel">
      <div class="form-wrap">

        <h1 class="title">Create Account</h1>
        <p class="subtitle">Create a Creator account to upload and post outfits.</p>

        <form id="registerForm" class="form" novalidate>

          <label class="field">
            <span class="sr-only">Display name</span>
            <input
              type="text"
              id="displayName"
              placeholder="Display name"
              autocomplete="name"
              required
            />
          </label>

          <label class="field">
            <span class="sr-only">Username</span>
            <input
              type="text"
              id="username"
              placeholder="Username"
              autocomplete="username"
              required
            />
          </label>

          <label class="field">
            <span class="sr-only">Password</span>
            <input
              type="password"
              id="password"
              placeholder="Password"
              autocomplete="new-password"
              required
            />
          </label>

          <label class="field">
            <span class="sr-only">Confirm password</span>
            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm password"
              autocomplete="new-password"
              required
            />
          </label>

          <button class="btn" type="submit">Create Account</button>

          <p class="small">
            Already have an account?
            <a class="link" href="login.html">Sign in</a>
          </p>

          <p id="message" class="message" aria-live="polite"></p>

        </form>
      </div>
    </section>

  </main>

  <script src="../Javascript/store.js"></script>
  <script src="../Javascript/app.js"></script>
  <script src="../Javascript/register.js"></script>

</body>
</html>
