<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Board - 489 Fashion</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/create-board.css">
</head>
<body>

    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="home.html">
                <span class="brand-mark">489</span>
                <span>Fashion</span>
            </a>
            <nav class="nav-center" id="topNav">
                <a href="dashboard.html">Dashboard</a> 
                <a href="wardrobe.html">Wardrobe</a>    
                <a href="generator.html">Generator</a>     
                <a href="saved-outfits.html">Saved Outfits</a>      
                <a href="board.html" class="active">Boards</a>
            </nav>
            <div class="nav-right">
                <a class="signin-link" href="../index.html">Logout</a>
                <a class="avatar-btn" href="profile.html"><span class="avatar-fallback">JN</span></a>
            </div>
        </div>
    </header>

    <main class="create-container">
        
        <div class="form-card">
            <div class="form-header">
                <h1>Create New Board</h1>
                <p>Organize your outfits into a collection.</p> </div>

            <form id="create-board-form">
                <div class="form-group">
                    <label for="board-name">Board Name</label>
                    <input type="text" id="board-name" placeholder="e.g., Summer 2026, Office Fits" required>
                </div>

                <div class="form-group">
                    <label for="board-desc">Description <span class="optional">(Optional)</span></label>
                    <textarea id="board-desc" rows="3" placeholder="What is this collection for?"></textarea>
                </div>

                <div class="form-group">
                    <label>Visibility</label>
                    <div class="visibility-options">
                        <label class="radio-card selected">
                            <input type="radio" name="visibility" value="private" checked>
                            <div class="radio-content">
                                <span class="radio-title">🔒 Private</span>
                                <span class="radio-desc">Only you can see this board.</span>
                            </div>
                        </label>

                        <label class="radio-card disabled" title="Upgrade to Creator to unlock">
                            <input type="radio" name="visibility" value="public" disabled>
                            <div class="radio-content">
                                <span class="radio-title">🌍 Public <span class="badge">Creator</span></span>
                                <span class="radio-desc">Visible to followers and the feed.</span>
                            </div>
                        </label>
                    </div>
                    <p class="helper-text">Standard users are limited to Private boards. <a href="settings.html">Upgrade to Creator</a></p>
                </div>

                <div class="form-actions">
                    <a href="dashboard.html" class="btn secondary">Cancel</a>
                    <button type="submit" class="btn primary-btn">Create Board</button>
                </div>
            </form>
        </div>

    </main>

    <script src="../Javascript/create-board.js"></script>
</body>
</html>
