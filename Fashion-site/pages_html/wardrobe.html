<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wardrobe - 489 Fashion</title>

  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/wardrobe.css" />
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="home.html">
        <span class="brand-mark">489</span>
        <span>Fashion</span>
      </a>

      <nav class="nav-center" id="topNav"></nav>

      <div class="nav-right">
        <a class="signin-link" href="login.html" data-page="login.html">Sign In</a>
        <a class="avatar-btn" href="profile.html" title="Account Settings">
          <span class="avatar-fallback">👤</span>
        </a>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <div class="page-header">
        <div>
          <h1>My Wardrobe</h1>
          <p>Browse, filter, and manage your clothing items.</p>
        </div>

        <a class="primary-link" href="add-item.html">+ Add Item</a>
      </div>

      <section class="toolbar card">
        <div class="toolbar-grid">
          <div class="field">
            <label for="searchInput">Search</label>
            <input id="searchInput" type="text" placeholder="Search by item name or tag" />
          </div>

          <div class="field">
            <label for="categoryFilter">Category</label>
            <select id="categoryFilter">
              <option value="all">All Categories</option>
              <option value="tops">Tops</option>
              <option value="bottoms">Bottoms</option>
              <option value="shoes">Shoes</option>
              <option value="outerwear">Outerwear</option>
              <option value="accessories">Accessories</option>
            </select>
          </div>

          <div class="field">
            <label for="colorFilter">Color</label>
            <select id="colorFilter">
              <option value="all">All Colors</option>
              <option value="black">Black</option>
              <option value="white">White</option>
              <option value="blue">Blue</option>
              <option value="gray">Gray</option>
              <option value="green">Green</option>
              <option value="brown">Brown</option>
              <option value="pink">Pink</option>
            </select>
          </div>

          <div class="field">
            <label for="sortFilter">Sort</label>
            <select id="sortFilter">
              <option value="name-asc">Name A–Z</option>
              <option value="name-desc">Name Z–A</option>
              <option value="recent">Recently Added</option>
            </select>
          </div>
        </div>

        <div class="toolbar-actions">
          <button id="clearFiltersBtn" class="btn btn-secondary" type="button">Clear Filters</button>
          <span class="results-text" id="resultsText">0 items</span>
        </div>
      </section>

      <section class="empty-state card hidden" id="emptyState">
        <h2>No items found</h2>
        <p>Try changing your filters or add a new clothing item to your wardrobe.</p>
        <a class="primary-link" href="add-item.html">Add Your First Item</a>
      </section>

      <section class="grid" id="wardrobeGrid"></section>
    </div>
  </main>

  <script src="../Javascript/store.js"></script>
  <script src="../Javascript/app.js"></script>
  <script src="../Javascript/wardrobe.js"></script>
</body>
</html>
