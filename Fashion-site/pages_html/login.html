<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - 489 Fashion</title>

  <!-- Shared navbar styles -->
  <link rel="stylesheet" href="../css/main.css" />

  <!-- Page-specific styles -->
  <link rel="stylesheet" href="../css/login.css" />
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <!-- LEFT -->
      <a class="brand" href="home.html">
        <span class="brand-mark">489</span>
        <span>Fashion</span>
      </a>

      <!-- CENTER (app.js will populate based on role) -->
      <nav class="nav-center" id="topNav"></nav>

      <!-- RIGHT -->
      <div class="nav-right">
        <a class="signin-link" href="login.html" data-page="login.html">Sign In</a>
        <a class="signin-link" href="register.html" data-page="register.html">Register</a>

        <!-- Keep avatar markup consistent across pages (app.js hides it for guests) -->
        <a class="avatar-btn" href="profile.html" title="Account Settings">
          <span class="avatar-fallback">👤</span>
        </a>
      </div>
    </div>
  </header>

  <main class="auth-layout">
    <!-- Left side -->
    <section class="left-panel" aria-label="Left visual panel"></section>

    <!-- Right side -->
    <section class="right-panel" aria-label="Sign in panel">
      <div class="form-wrap">
        <h1 class="title">Sign In</h1>

        <form id="loginForm" class="form" novalidate>
          <label class="field">
            <span class="sr-only">Username</span>
            <input type="text" id="username" placeholder="Username" autocomplete="username" required />
          </label>

          <label class="field">
            <span class="sr-only">Password</span>
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
          </label>

          <div class="row">
            <a class="link" href="#" id="forgotLink">Forgot password</a>
          </div>

          <button class="btn" type="submit">Sign In</button>

          <p class="small">
            New to 489 Fashion?
            <a class="link" href="register.html" id="registerLink">Sign up now</a>
          </p>

          <p id="message" class="message" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="../Javascript/app.js"></script>
  <script src="../Javascript/login.js"></script>
</body>
</html>
