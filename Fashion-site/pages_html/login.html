<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - 489 Fashion</title>

  <!-- Shared navbar styles -->
  <link rel="stylesheet" href="../css/main.css" />

  <!-- Page-specific styles -->
  <link rel="stylesheet" href="../css/login.css" />
</head>

<body>

  <header class="topbar">
    <div class="topbar-inner">
      <!-- LEFT -->
      <a class="brand" href="home.html">
        <span class="brand-mark">489</span>
        <span>Fashion</span>
      </a>

      <!-- CENTER -->
      <nav class="nav-center" id="topNav">
        <a href="home.html" data-page="home.html">Home</a>
        <a href="wardrobe.html" data-page="wardrobe.html">Wardrobe</a>
        <a href="board.html" data-page="board.html">Board</a>
      </nav>

      <!-- RIGHT -->
      <div class="nav-right">
        <a class="signin-link" href="login.html" data-page="login.html">Sign In</a>

        <!-- Round avatar button -->
        <a class="avatar-btn" href="profile.html" title="Profile">
          <!-- Option A: Placeholder (no image yet) -->
          <span class="avatar-fallback">👤</span>

          <!-- Option B: When you have an image, uncomment this and delete the span above -->
          <!-- <img src="../Images/profile.jpg" alt="Profile" /> -->
        </a>
      </div>
    </div>
  </header>

  <!-- Your existing layout -->
  <main class="auth-layout">
    <!-- Left side (image area later) -->
    <section class="left-panel" aria-label="Left visual panel"></section>

    <!-- Right side (form) -->
    <section class="right-panel" aria-label="Sign in panel">
      <div class="form-wrap">
        <h1 class="title">Sign In</h1>

        <form id="loginForm" class="form" novalidate>
          <label class="field">
            <span class="sr-only">Username</span>
            <input type="text" id="username" placeholder="Username" autocomplete="username" required />
          </label>

          <label class="field">
            <span class="sr-only">Password</span>
            <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
          </label>

          <div class="row">
            <a class="link" href="#" id="forgotLink">Forgot password</a>
          </div>

          <button class="btn" type="submit">Sign In</button>

          <p class="small">
            New to 489 Fashion?
            <a class="link" href="#" id="registerLink">Sign up now</a>
          </p>

          <p id="message" class="message" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <!-- Shared navbar JS (mobile menu + active link) -->
  <script src="../Javascript/app.js"></script>

  <!-- Page-specific JS -->
  <script src="../Javascript/login.js"></script>
</body>
</html>
